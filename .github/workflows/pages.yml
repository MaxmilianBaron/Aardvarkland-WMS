name: Deploy Aardvarkland WMS product preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload product preview
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy product preview
        id: deployment
        uses: actions/deploy-pages@v5
